services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dianshang-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3456}
      DATA_DIR: /app/data
      DB_PATH: /app/data/data.db
      UPLOAD_DIR: /app/uploads
      LOG_DIR: /app/logs
    ports:
      - "${PORT:-3456}:3456"
    volumes:
      - dianshang-data:/app/data
      - dianshang-uploads:/app/uploads
      - dianshang-logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3456/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  dianshang-data:
  dianshang-uploads:
  dianshang-logs:
