server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    location = /gateway-health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    location = /CHAT {
        return 308 /chat/;
    }

    location = /CHAT/ {
        return 308 /chat/;
    }

    location = /chat {
        return 308 /chat/;
    }

    location ^~ /chat-api/ {
        rewrite ^/chat-api/(.*)$ /api/$1 break;
        proxy_pass http://librechat:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /chat;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /chat/assets/index.7-3Zm5Bb.js {
        return 410;
    }

    location = /chat/assets/index.7YakS8m_.js {
        return 410;
    }

    location ^~ /chat/ {
        rewrite ^/chat/(.*)$ /$1 break;
        proxy_pass http://librechat:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /chat;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cookie_path / /chat/;
        proxy_redirect ~^/(.*)$ /chat/$1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @chat_maintenance;
    }

    location @chat_maintenance {
        default_type text/html;
        add_header Retry-After 30 always;
        return 503 '<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 对话维护中</title><style>body{margin:0;font-family:system-ui,sans-serif;background:#f5f7f9;color:#17202a;display:grid;place-items:center;min-height:100vh}.panel{max-width:460px;padding:32px;border:1px solid #dfe4e8;background:#fff;border-radius:8px;text-align:center}.panel a{color:#166534}</style><main class="panel"><h1>AI 对话暂时不可用</h1><p>聊天服务正在启动或维护，现有网站其他功能不受影响。</p><a href="/">返回首页</a></main></html>';
    }

    location / {
        proxy_pass http://app:3456;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
