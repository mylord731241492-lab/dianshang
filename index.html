    <script>
      // Fix for environments where some libraries try to overwrite window.fetch
      // and cause "TypeError: Cannot set property fetch of #<Window> which has only a getter".
      // Also downgrade the expected local-folder autosave prompt from error to warning.
      (function() {
        try {
          var originalConsoleError = console.error && console.error.bind(console);
          if (originalConsoleError && !console.__hjmCanvasSaveGuarded) {
            console.__hjmCanvasSaveGuarded = true;
            console.error = function() {
              var args = Array.prototype.slice.call(arguments);
              var message = args.map(function(item) {
                return item && item.message ? item.message : String(item);
              }).join(' ');
              if (message.indexOf('Local workflow auto save failed') !== -1 && message.indexOf('请先选择本地保存文件夹') !== -1) {
                console.warn.apply(console, ['Local workflow auto save skipped:'].concat(args.slice(1)));
                return;
              }
              originalConsoleError.apply(console, arguments);
            };
          }
          var originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { console.warn('Something tried to overwrite window.fetch - ignored'); },
              configurable: true
            });
          }
          try {
            var supportsLocalFolderPicker = !!window.showDirectoryPicker;
            var savedCanvasMode = localStorage.getItem('canvasSaveMode');
            if (!savedCanvasMode || (!supportsLocalFolderPicker && savedCanvasMode === 'local')) {
              localStorage.setItem('canvasSaveMode', 'cloud');
            }
          } catch (storageError) {
            console.warn('Could not initialize cloud canvas save mode:', storageError);
          }
        } catch (e) {
          console.warn('Could not install startup guards:', e);
        }
      })();
    </script>
